<h1 style="margin: 30px; color: rgb(250, 21, 21);">Comidas Deliciosas</h1>
<div class="_menu">
    <app-comida-card
        *ngFor="let _food of menu, track:$index"
        [food]="_food"
        (click)="onCardClick(_food)";
    ></app-comida-card>
</div>

<app-comida-details-modal 
    *ngIf="focusedFood" 
    [item]="focusedFood"
    (onClose)="focusedFood = undefined"
    >
</app-comida-details-modal>
