<div class="modal-bg" (click)="toggleClose()"></div>
<div class="modal-container">
    <div class="modal-header">
        <div style="width:30px"></div>
        <div class="title" > 
            <ng-content></ng-content>
        </div>
        <div>
            <img class="close" (click)="toggleClose()" src="https://icones.pro/wp-content/uploads/2021/08/icone-x-avec-cercle-bleue.png" style="height: 30px; width: 30px;">
        </div>
    </div>
    <br>
    <div>
        <h1 class="h1">Nome:</h1><input placeholder=" Digite o nome:" class="input"><br><br>
        <h1 class="h1">CPF:</h1><input placeholder=" Digite o CPF:" class="input"><br><br>
        <h1 class="h1">Telefone:</h1><input placeholder=" Digite o telefone:" class="input"><br><br>
        <h1 class="h1">Email:</h1><input placeholder=" Digite o email:" class="input"><br><br>
        <h1 class="h1">Senha:</h1><input placeholder=" Digite a senha:" class="input"><br><br>
    </div>

    <div class="modal-footer">
        <ng-content select=".button" (click)="toggleClose()"></ng-content>
    </div>
</div>
