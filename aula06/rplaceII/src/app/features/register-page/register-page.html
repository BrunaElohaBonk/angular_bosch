<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double:wght@100..900&display=swap" rel="stylesheet">

<div class="container">

  <header class="header">
    <h1>RPlace</h1>
  </header>

  <div class="content">
    <div class="card">

      <div class="card-header">
        <h2>Criar Conta</h2>
      </div>

      <div class="card-body">
        <div class="form">
          <input [(ngModel)]="name" placeholder="Nome completo">
          <input [(ngModel)]="email" placeholder="Email">
          <input [(ngModel)]="password" type="password" placeholder="Senha">
          <input [(ngModel)]="confirmPassword" type="password" placeholder="Confirmar senha">

          <button (click)="register()">Cadastrar</button>

          <p>
            Já tem conta?
            <a routerLink="/login">Entrar</a>
          </p>
        </div>
      </div>

    </div>
  </div>

</div>
